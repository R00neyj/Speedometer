<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#29343b",
                    "on-tertiary": "#fff6ff",
                    "error-dim": "#67040d",
                    "on-secondary": "#f9f8ff",
                    "outline-variant": "#a8b3bc",
                    "on-error-container": "#6e0a12",
                    "on-secondary-fixed": "#383f51",
                    "surface-container-lowest": "#ffffff",
                    "primary-dim": "#004db5",
                    "primary": "#0058cd",
                    "secondary-fixed-dim": "#ced4eb",
                    "background": "#f6faff",
                    "tertiary-dim": "#5e4b73",
                    "secondary": "#585f72",
                    "tertiary-fixed-dim": "#d3baea",
                    "secondary-container": "#dce2f9",
                    "primary-container": "#2472f8",
                    "inverse-surface": "#0a0f12",
                    "secondary-fixed": "#dce2f9",
                    "surface-dim": "#d1dbe5",
                    "primary-fixed": "#2472f8",
                    "surface-variant": "#d9e4ed",
                    "on-primary-container": "#000000",
                    "inverse-primary": "#578cff",
                    "surface": "#f6faff",
                    "error": "#a83836",
                    "inverse-on-surface": "#999da2",
                    "surface-container": "#e7eff6",
                    "surface-tint": "#0058cd",
                    "primary-fixed-dim": "#0065ea",
                    "on-surface-variant": "#566068",
                    "on-tertiary-container": "#523f67",
                    "tertiary": "#6b5780",
                    "on-tertiary-fixed": "#3e2c52",
                    "on-secondary-container": "#4b5164",
                    "tertiary-container": "#e1c8f8",
                    "surface-container-high": "#e0e9f1",
                    "secondary-dim": "#4c5366",
                    "error-container": "#fa746f",
                    "on-primary-fixed": "#ffffff",
                    "surface-container-highest": "#d9e4ed",
                    "outline": "#717c85",
                    "on-tertiary-fixed-variant": "#5c4871",
                    "tertiary-fixed": "#e1c8f8",
                    "on-secondary-fixed-variant": "#555b6e",
                    "surface-bright": "#f6faff",
                    "on-primary": "#f9f8ff",
                    "on-primary-fixed-variant": "#edefff",
                    "on-error": "#fff7f6",
                    "on-background": "#29343b",
                    "surface-container-low": "#eef4fb"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gauge-dial {
            background: conic-gradient(from 225deg, #0058cd 0%, #2472f8 75%, #d9e4ed 75% 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<script>
  function toggleTracking() {
    const btn = document.getElementById('tracking-btn');
    const isStarted = btn.getAttribute('data-started') === 'true';
    
    if (isStarted) {
      btn.innerHTML = '<span class="material-symbols-outlined">play_arrow</span><span>Start</span>';
      btn.classList.remove('bg-error', 'dark:bg-error');
      btn.classList.add('bg-primary', 'dark:bg-primary');
      btn.setAttribute('data-started', 'false');
    } else {
      btn.innerHTML = '<span class="material-symbols-outlined">stop</span><span>Stop</span>';
      btn.classList.remove('bg-primary', 'dark:bg-primary');
      btn.classList.add('bg-error', 'dark:bg-error');
      btn.setAttribute('data-started', 'true');
    }
  }
</script></head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f6faff] dark:bg-[#0a0c10] flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50 tonal-shift bg-[#e7eff6] dark:bg-[#1a222c] flat no-shadows">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#1B6EF3] dark:text-[#4d8df6]" data-icon="speed">speed</span>
<h1 class="text-xl font-extrabold text-[#1B6EF3] dark:text-[#4d8df6] font-['Plus_Jakarta_Sans'] tracking-tight">Velocity</h1>
</div>
<button class="hover:opacity-80 transition-opacity scale-95 active:duration-150">
<span class="material-symbols-outlined text-[#a8b3bc] dark:text-[#5c6975]" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-start pt-20 px-6 pb-64">
<!-- Asymmetric Layout: Status Badge -->
<div class="w-full max-w-md flex justify-end mb-8">
<div class="bg-surface-container-low px-4 py-2 rounded-full flex items-center gap-2 shadow-sm">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant">GPS Signal High</span>
</div>
</div>
<!-- Gauge Container -->
<div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center mb-12">
<!-- Decorative Outer Ring -->
<div class="absolute inset-0 rounded-full border-[12px] border-surface-container-highest opacity-40"></div>
<!-- Gauge Progress Track -->
<div class="absolute inset-0 rounded-full gauge-dial opacity-10 blur-[1px]"></div>
<!-- Main Gauge Shell -->
<div class="relative w-64 h-64 md:w-72 md:h-72 rounded-full bg-surface-container-lowest shadow-[0px_16px_48px_rgba(41,52,59,0.08)] flex items-center justify-center overflow-hidden">
<!-- Radial Grids (Subtle) -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle, #717c85 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Speed Content -->
<div class="z-10 flex flex-col items-center">
<span class="text-[10px] font-extrabold text-on-surface-variant tracking-[0.25em] mb-2">CURRENT SPEED</span>
<div class="flex items-baseline">
<span class="text-8xl font-extrabold font-headline text-primary tracking-tighter leading-none">74</span>
<span class="text-lg font-bold text-on-surface-variant ml-1 opacity-70">km/h</span>
</div>
</div>
<!-- Circular Needle Indicator (CSS Rotation) -->
<div class="absolute inset-4 rounded-full border-[2px] border-dashed border-outline-variant/15 rotate-[130deg]">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-1.5 h-6 bg-primary rounded-full shadow-[0_0_12px_rgba(0,88,205,0.4)]"></div>
</div>
</div>
<!-- Floating Decoration -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-primary-container/20 backdrop-blur-md px-5 py-1.5 rounded-full border border-primary/10">
<span class="text-[9px] font-black text-primary uppercase tracking-widest">Peak: 112 km/h</span>
</div>
</div>
<!-- Stats Grid (Key Metrics Only) -->
<div class="grid grid-cols-2 gap-5 w-full max-w-md mt-4">
<div class="bg-surface-container-lowest p-6 rounded-2xl shadow-[0px_4px_24px_rgba(41,52,59,0.03)] flex flex-col gap-1 items-center text-center border border-surface-container-low/50">
<span class="material-symbols-outlined text-primary mb-2 opacity-80" data-icon="route">route</span>
<span class="text-[10px] font-extrabold text-on-surface-variant uppercase tracking-wider">Distance</span>
<span class="text-xl font-extrabold font-headline text-on-surface">12.4 km</span>
</div>
<div class="bg-surface-container-lowest p-6 rounded-2xl shadow-[0px_4px_24px_rgba(41,52,59,0.03)] flex flex-col gap-1 items-center text-center border border-surface-container-low/50">
<span class="material-symbols-outlined text-secondary mb-2 opacity-80" data-icon="timer">timer</span>
<span class="text-[10px] font-extrabold text-on-surface-variant uppercase tracking-wider">Duration</span>
<span class="text-xl font-extrabold font-headline text-on-surface">18:42</span>
</div>
</div>
</main>
<!-- Floating Action Area -->
<div class="fixed bottom-28 left-0 right-0 flex justify-center z-40 px-6">
<button class="w-full max-w-md bg-primary text-white h-16 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl shadow-primary/25 transition-all active:scale-[0.97] hover:brightness-110" data-started="false" id="tracking-btn" onclick="toggleTracking()">
<span class="material-symbols-outlined">play_arrow</span>
<span class="uppercase tracking-widest text-sm">Start Tracking</span>
</button>
</div>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-white/80 dark:bg-black/80 backdrop-blur-2xl rounded-t-[2.5rem] shadow-[0px_-16px_40px_rgba(41,52,59,0.08)] border-t border-white/20">
<!-- Inactive Tab: Digital -->
<div class="flex flex-col items-center justify-center text-[#a8b3bc] dark:text-[#5c6975] px-6 py-2 hover:text-[#1B6EF3] dark:hover:text-[#4d8df6] transition-colors tap-highlight-none scale-90 active:scale-75">
<span class="material-symbols-outlined text-2xl" data-icon="numbers">numbers</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold mt-1 uppercase tracking-tighter">Digital</span>
</div>
<!-- Active Tab: Gauge -->
<div class="flex flex-col items-center justify-center bg-[#1B6EF3]/10 dark:bg-[#1B6EF3]/20 text-[#1B6EF3] dark:text-[#4d8df6] rounded-2xl px-6 py-2.5 tap-highlight-none scale-90 active:scale-75">
<span class="material-symbols-outlined text-2xl" data-icon="speed" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold mt-1 uppercase tracking-tighter">Gauge</span>
</div>
</nav>
</body></html>
